name: Shipforge Auto Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # !! BUILD-TIME ONLY — NOT REAL CREDENTIALS !!
          # These stubs satisfy env validation during `prisma generate && next build`.
          # No real database, Stripe, or auth connection is made at build time.
          # Real secrets are injected at runtime via the server's .env file.
          DATABASE_URL: postgresql://BUILD_ONLY:BUILD_ONLY@localhost:5432/BUILD_ONLY
          APP_URL: https://shipforge.dev
          NEXT_PUBLIC_APP_URL: https://shipforge.dev
          # AUTH_SECRET must be ≥32 chars to pass Zod validation
          AUTH_SECRET: BUILD_ONLY_STUB_DO_NOT_USE_IN_PROD_XX
          STRIPE_SECRET_KEY: sk_test_BUILD_ONLY_NOT_REAL
          STRIPE_WEBHOOK_SECRET: whsec_BUILD_ONLY_NOT_REAL
          STRIPE_PRICE_STARTER: price_BUILD_ONLY_STARTER
          STRIPE_PRICE_PRO: price_BUILD_ONLY_PRO
          STRIPE_PRICE_TEAM: price_BUILD_ONLY_TEAM
          STRIPE_PORTAL_RETURN_URL: https://shipforge.dev/billing

      # 2️⃣ Set up Docker
      - name: Set up Docker
        uses: docker/setup-buildx-action@v2

      # 3️⃣ Deploy to server via SSH
      - name: Deploy and Monitor
        if: ${{ env.SERVER_HOST != '' }}
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        uses: appleboy/ssh-action@v0.1.9
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT }}
          script: |
            cd /home/${{ secrets.SERVER_USER }}/shipforge
            git pull origin main
            docker-compose up -d --build
            docker exec -it shipforge_backend node scripts/create-admin.js || true
            
            # Wait for services to start
            sleep 30
            
            # Health checks
            if curl -f --max-time 10 https://shipforge.dev > /dev/null && curl -f --max-time 10 https://api.shipforge.dev > /dev/null; then
              echo "Deployment successful - services are healthy"
            else
              echo "Deployment failed - rolling back to previous commit"
              git reset --hard HEAD~1
              docker-compose up -d --build
              echo "Rollback complete"
            fi
