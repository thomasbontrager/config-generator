# SSL/TLS termination is handled by an upstream reverse proxy (e.g. Cloudflare
# or a separate load balancer), so this server block only needs to listen on
# port 80 for traffic forwarded from that upstream.
server {
    listen 80;
    server_name shipforge.dev www.shipforge.dev;

    root /home/thomasbontragerdev/bontrager-systems/apps/config-generator/dist;
    index index.html;

    # Proxy API requests to the local Express backend.
    # Backend port (5000) must match PORT in backend/.env (default: 5000).
    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri /index.html;
    }
}
