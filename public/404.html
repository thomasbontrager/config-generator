<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShipForge - Ship production-ready stacks</title>
    <script>
      // SPA fallback: redirect all routes to index.html for React Router to handle
      const path = location.pathname + location.search + location.hash;
      // Only store if it's a valid relative path (starts with /)
      if (path.startsWith('/') && !path.includes('://')) {
        sessionStorage.setItem('redirect', path);
      }
      location.replace('/');
    </script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
